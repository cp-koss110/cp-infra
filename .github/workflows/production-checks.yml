name: Production PR Checks

on:
  pull_request:
    branches:
      - production

env:
  TF_DIR: iac/terraform/envs/eus2
  AWS_REGION: ${{ secrets.AWS_REGION || 'us-east-2' }}

jobs:
  validate:
    name: Terraform Validate & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Terraform Format Check
        working-directory: ${{ env.TF_DIR }}
        run: terraform fmt -check -recursive ../../

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Write backend config
        working-directory: ${{ env.TF_DIR }}
        run: |
          cat > backend.hcl <<EOF
          bucket         = "${{ secrets.TF_BACKEND_BUCKET }}"
          key            = "envs/eus2/terraform.tfstate"
          region         = "${{ env.AWS_REGION }}"
          dynamodb_table = "${{ secrets.TF_LOCK_TABLE }}"
          encrypt        = true
          EOF

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: terraform validate

  plan:
    name: Terraform Plan — Production
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: true

      - name: Write backend config
        working-directory: ${{ env.TF_DIR }}
        run: |
          cat > backend.hcl <<EOF
          bucket         = "${{ secrets.TF_BACKEND_BUCKET }}"
          key            = "envs/eus2/terraform.tfstate"
          region         = "${{ env.AWS_REGION }}"
          dynamodb_table = "${{ secrets.TF_LOCK_TABLE }}"
          encrypt        = true
          EOF

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan \
            -var-file=prod.tfvars \
            -var-file=image_tags.production.tfvars \
            -var="api_token_value=${{ secrets.TF_VAR_API_TOKEN }}" \
            -no-color 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('${{ env.TF_DIR }}/plan_output.txt', 'utf8');
            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + '\n\n... output truncated (too large for comment)'
              : planOutput;
            const body = `## Terraform Plan — Production\n\n<details>\n<summary>Click to expand plan output</summary>\n\n\`\`\`hcl\n${truncated}\n\`\`\`\n</details>`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body,
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1

  smoke-test:
    name: Smoke Tests — Staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve ALB URL from SSM
        id: alb
        run: |
          ALB_URL=$(aws ssm get-parameter \
            --name "/exam-costa/staging/outputs/alb_url" \
            --query "Parameter.Value" \
            --output text 2>/dev/null || echo "${{ secrets.STAGING_ALB_URL }}")
          echo "ALB_URL=$ALB_URL" >> $GITHUB_ENV

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r iac/tests/e2e/requirements.txt

      - name: Run smoke tests against staging
        env:
          ALB_URL: ${{ env.ALB_URL }}
        run: pytest iac/tests/e2e/test_smoke.py -v
