name: Production Deploy

on:
  push:
    branches:
      - production

env:
  TF_DIR: iac/terraform/envs/eus2
  AWS_REGION: us-east-2
  TF_BACKEND_BUCKET: exam-costa-terraform-state
  TF_LOCK_TABLE: exam-costa-terraform-locks

jobs:
  deploy-production:
    name: Terraform Apply — Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Fetch API token from SSM
        id: api-token
        run: |
          TOKEN=$(aws ssm get-parameter \
            --name "/exam-costa/api/token" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text)
          echo "::add-mask::$TOKEN"
          echo "TF_API_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Write backend config
        working-directory: ${{ env.TF_DIR }}
        run: |
          cat > backend.hcl <<EOF
          bucket         = "${{ env.TF_BACKEND_BUCKET }}"
          key            = "envs/eus2/production/terraform.tfstate"
          region         = "${{ env.AWS_REGION }}"
          dynamodb_table = "${{ env.TF_LOCK_TABLE }}"
          encrypt        = true
          EOF

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan \
            -var-file=prod.tfvars \
            -var-file=image_tags.production.tfvars \
            -var="api_token_value=${{ env.TF_API_TOKEN }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve tfplan
