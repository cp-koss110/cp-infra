name: Staging Deploy

on:
  push:
    branches:
      - main
    paths:
      - "iac/**"

env:
  PROJECT_NAME: exam-costa
  TF_DIR: iac/terraform/envs/eus2
  AWS_REGION: us-east-2
  TF_BACKEND_BUCKET: exam-costa-terraform-state
  TF_LOCK_TABLE: exam-costa-terraform-locks

jobs:
  deploy-staging:
    name: Terraform Apply — Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Write backend config
        working-directory: ${{ env.TF_DIR }}
        run: |
          cat > backend.hcl <<EOF
          bucket         = "${{ env.TF_BACKEND_BUCKET }}"
          key            = "envs/eus2/staging/terraform.tfstate"
          region         = "${{ env.AWS_REGION }}"
          dynamodb_table = "${{ env.TF_LOCK_TABLE }}"
          encrypt        = true
          EOF

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: terraform init -backend-config=backend.hcl

      - name: Terraform Plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform plan \
            -var-file=staging.tfvars \
            -var-file=image_tags.staging.tfvars \
            -out=tfplan

      - name: Terraform Apply
        working-directory: ${{ env.TF_DIR }}
        run: terraform apply -auto-approve tfplan
