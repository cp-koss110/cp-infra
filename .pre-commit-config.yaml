repos:
  # ── Basic file hygiene ─────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  # ── Terraform formatting (no init needed, no AWS calls) ───────────────────
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.92.1
    hooks:
      - id: terraform_fmt
      # terraform_validate is intentionally excluded — it requires
      # `terraform init` (downloads providers) and is too slow for pre-commit.
      # Run `make test-validate` locally or let CI handle it.

  # ── Secret scanning ────────────────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        # Exclude tfvars and generated lock files — they may contain
        # non-secret values that look like secrets (ARNs, bucket names)
        exclude: >
          (?x)^(
            .*\.tfvars|
            .*\.terraform\.lock\.hcl
          )$
