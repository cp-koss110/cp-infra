version: "3.8"

# Optional local monitoring stack — Prometheus + Grafana + Node Exporter
#
# Usage from cp-infra root:
#   make local-monitoring-up    — start monitoring stack
#   make local-monitoring-down  — stop and remove monitoring stack
#
# Grafana:    http://localhost:3001  (admin / admin)
# Prometheus: http://localhost:9090
# Node Exp:   http://localhost:9100/metrics

networks:
  monitoring:
    name: exam-costa-monitoring
    driver: bridge

services:

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: exam-costa-prometheus
    networks:
      - monitoring
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.2
    container_name: exam-costa-grafana
    networks:
      - monitoring
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.0
    container_name: exam-costa-node-exporter
    networks:
      - monitoring
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    restart: unless-stopped

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
