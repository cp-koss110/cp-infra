global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "api"
    metrics_path: /metrics
    static_configs:
      - targets: ["exam-costa-api:8000"]

  - job_name: "worker"
    metrics_path: /metrics
    static_configs:
      - targets: ["exam-costa-worker:8000"]
